  <text x="552" y="382" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650">A blood test called troponin is slightly higher than normal.</text>
  <text x="552" y="416" fill="#697875" font-family="Inter, Arial, sans-serif" font-size="17">CLARA preserves uncertainty and avoids diagnosis or treatment advice.</text>

